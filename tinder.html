<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tinder Swipe Cards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
    }

    .card {
      touch-action: none;
      user-select: none;
      will-change: transform;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .card.dragging {
      transition: none;
      cursor: grabbing;
    }

    .stamp {
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .card.show-like .stamp-like {
      opacity: 1;
    }

    .card.show-nope .stamp-nope {
      opacity: 1;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-pink-100 via-white to-rose-100">
  <div class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="flex items-center justify-between px-6 py-4">
      <button class="w-11 h-11 rounded-full bg-white shadow flex items-center justify-center text-xl">
        ⚙️
      </button>
      <h1 class="text-2xl font-bold text-rose-500">Swipe Match</h1>
      <button class="w-11 h-11 rounded-full bg-white shadow flex items-center justify-center text-xl">
        💬
      </button>
    </header>

    <!-- Card Area -->
    <main class="flex-1 flex items-center justify-center px-4 pb-6">
      <div id="stack" class="relative w-full max-w-sm h-[70vh]">
        <!-- Cards will be injected here -->
      </div>
    </main>

    <!-- Actions -->
    <footer class="pb-8">
      <div class="flex items-center justify-center gap-5">
        <button id="dislikeBtn"
          class="w-16 h-16 rounded-full bg-white shadow-lg text-3xl hover:scale-105 active:scale-95 transition">
          ❌
        </button>
        <button
          class="w-14 h-14 rounded-full bg-white shadow-lg text-2xl hover:scale-105 active:scale-95 transition">
          ⭐
        </button>
        <button id="likeBtn"
          class="w-16 h-16 rounded-full bg-white shadow-lg text-3xl hover:scale-105 active:scale-95 transition">
          ❤️
        </button>
      </div>
    </footer>
  </div>

  <script>
    const profiles = [
      {
        name: "Mina",
        age: 24,
        bio: "ชอบคาเฟ่ ถ่ายรูป และเที่ยวทะเล 🌊",
        image: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=900&q=80"
      },
      {
        name: "Aom",
        age: 26,
        bio: "สายกิน ชอบดูหนัง และรักหมามาก 🐶",
        image: "https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=900&q=80"
      },
      {
        name: "ปราย",
        age: 23,
        bio: "ชอบฟังเพลงอินดี้ และออกทริปภูเขา ⛰️",
        image: "https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?auto=format&fit=crop&w=900&q=80"
      },
      {
        name: "Jane",
        age: 27,
        bio: "ทำงานสายครีเอทีฟ รักงานศิลปะและกาแฟ ☕",
        image: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=900&q=80"
      }
    ];

    const stack = document.getElementById("stack");
    const likeBtn = document.getElementById("likeBtn");
    const dislikeBtn = document.getElementById("dislikeBtn");

    let cards = [];
    let currentTopCard = null;

    function createCard(profile, index) {
      const card = document.createElement("div");
      card.className = `
        card absolute inset-0 rounded-3xl shadow-2xl overflow-hidden bg-white cursor-grab
        ${index === profiles.length - 1 ? "" : ""}
      `;

      card.style.zIndex = index + 1;
      card.style.transform = `scale(${1 - (profiles.length - 1 - index) * 0.04}) translateY(${(profiles.length - 1 - index) * 10}px)`;

      card.innerHTML = `
        <div class="relative w-full h-full">
          <img src="${profile.image}" alt="${profile.name}" class="w-full h-full object-cover" draggable="false">

          <div class="stamp stamp-like absolute top-8 left-6 border-4 border-green-500 text-green-500 font-extrabold text-3xl px-4 py-1 rounded-xl rotate-[-18deg] bg-white/70">
            LIKE
          </div>

          <div class="stamp stamp-nope absolute top-8 right-6 border-4 border-red-500 text-red-500 font-extrabold text-3xl px-4 py-1 rounded-xl rotate-[18deg] bg-white/70">
            NOPE
          </div>

          <div class="absolute inset-x-0 bottom-0 p-6 bg-gradient-to-t from-black/80 via-black/35 to-transparent text-white">
            <div class="flex items-end gap-2">
              <h2 class="text-3xl font-bold">${profile.name}</h2>
              <span class="text-2xl font-medium">${profile.age}</span>
            </div>
            <p class="mt-2 text-sm text-white/90 leading-relaxed">${profile.bio}</p>
          </div>
        </div>
      `;

      addDragBehavior(card);
      return card;
    }

    function renderCards() {
      stack.innerHTML = "";
      cards = profiles.map((profile, index) => createCard(profile, index));
      cards.forEach(card => stack.appendChild(card));
      currentTopCard = cards[cards.length - 1];
    }

    function refreshStackAppearance() {
      const visibleCards = [...stack.children];
      visibleCards.forEach((card, i) => {
        const depth = visibleCards.length - 1 - i;
        card.style.zIndex = i + 1;
        card.style.transform = `scale(${1 - depth * 0.04}) translateY(${depth * 10}px)`;
        card.classList.remove("show-like", "show-nope", "dragging");
      });
      currentTopCard = visibleCards[visibleCards.length - 1] || null;
    }

    function swipeCard(card, direction) {
      if (!card) return;

      const x = direction === "right" ? window.innerWidth : -window.innerWidth;
      const rotate = direction === "right" ? 25 : -25;

      card.style.transform = `translate(${x}px, -40px) rotate(${rotate}deg)`;
      card.style.opacity = "0";

      setTimeout(() => {
        card.remove();
        refreshStackAppearance();

        if (!stack.children.length) {
          showEmptyState();
        }
      }, 250);
    }

    function showEmptyState() {
      stack.innerHTML = `
        <div class="w-full h-full rounded-3xl bg-white shadow-2xl flex flex-col items-center justify-center text-center p-8">
          <div class="text-6xl mb-4">🎉</div>
          <h2 class="text-2xl font-bold text-gray-800">หมดการ์ดแล้ว</h2>
          <p class="text-gray-500 mt-2">กดรีเฟรชเพื่อเริ่มใหม่อีกครั้ง</p>
          <button onclick="location.reload()" class="mt-6 px-5 py-3 rounded-xl bg-rose-500 text-white font-semibold hover:bg-rose-600 transition">
            เริ่มใหม่
          </button>
        </div>
      `;
      currentTopCard = null;
    }

    function addDragBehavior(card) {
      let startX = 0;
      let startY = 0;
      let currentX = 0;
      let currentY = 0;
      let isDragging = false;

      function onPointerDown(e) {
        if (card !== currentTopCard) return;

        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        card.classList.add("dragging");

        card.setPointerCapture?.(e.pointerId);
      }

      function onPointerMove(e) {
        if (!isDragging) return;

        currentX = e.clientX - startX;
        currentY = e.clientY - startY;

        const rotate = currentX * 0.05;
        card.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotate}deg)`;

        if (currentX > 80) {
          card.classList.add("show-like");
          card.classList.remove("show-nope");
        } else if (currentX < -80) {
          card.classList.add("show-nope");
          card.classList.remove("show-like");
        } else {
          card.classList.remove("show-like", "show-nope");
        }
      }

      function onPointerUp() {
        if (!isDragging) return;
        isDragging = false;
        card.classList.remove("dragging");

        if (currentX > 120) {
          swipeCard(card, "right");
        } else if (currentX < -120) {
          swipeCard(card, "left");
        } else {
          card.style.transform = "";
          card.style.opacity = "1";
          card.classList.remove("show-like", "show-nope");
          refreshStackAppearance();
        }

        currentX = 0;
        currentY = 0;
      }

      card.addEventListener("pointerdown", onPointerDown);
      card.addEventListener("pointermove", onPointerMove);
      card.addEventListener("pointerup", onPointerUp);
      card.addEventListener("pointercancel", onPointerUp);
      card.addEventListener("lostpointercapture", onPointerUp);
    }

    likeBtn.addEventListener("click", () => {
      if (currentTopCard) {
        currentTopCard.classList.add("show-like");
        swipeCard(currentTopCard, "right");
      }
    });

    dislikeBtn.addEventListener("click", () => {
      if (currentTopCard) {
        currentTopCard.classList.add("show-nope");
        swipeCard(currentTopCard, "left");
      }
    });

    renderCards();
  </script>
</body>
</html>
